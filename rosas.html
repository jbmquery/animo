<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Rositas para Su 🌹</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:
            radial-gradient(circle at top, #3a0d1c 0%, #1b0610 40%, #090909 100%);
        overflow:hidden;
        font-family: 'Segoe UI', sans-serif;
        padding:20px;
    }

    .container{
        position:relative;
        width:100%;
        max-width:700px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
    }

    .bouquet{
        position:relative;
        width:min(70vw, 420px);
        height:min(70vw, 420px);
        display:flex;
        justify-content:center;
        align-items:center;
    }

    /* Tallos */
    .stem{
        position:absolute;
        width:10px;
        height:180px;
        background:linear-gradient(to bottom,#1bb14f,#0f5f2d);
        bottom:30px;
        border-radius:10px;
        z-index:1;
    }

    .stem.left{
        transform:rotate(-18deg);
        left:42%;
    }

    .stem.right{
        transform:rotate(18deg);
        right:42%;
    }

    .stem.center{
        height:200px;
    }

    /* Rosas */
    .rose{
        position:absolute;
        width:110px;
        height:110px;
        border-radius:50%;
        background:
            radial-gradient(circle at 35% 35%, #ff9db6 0%, #ff4d79 35%, #b40035 75%);
        box-shadow:
            inset -10px -10px 20px rgba(0,0,0,0.25),
            0 10px 25px rgba(0,0,0,0.35);
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        transition:1.5s ease;
        z-index:3;
    }

    .rose::before,
    .rose::after{
        content:"";
        position:absolute;
        border-radius:50%;
        background:rgba(255,255,255,0.08);
    }

    .rose::before{
        width:70px;
        height:70px;
    }

    .rose::after{
        width:40px;
        height:40px;
    }

    .rose1{
        top:20%;
        left:35%;
    }

    .rose2{
        top:35%;
        left:15%;
    }

    .rose3{
        top:35%;
        right:15%;
    }

    .rose4{
        top:55%;
        left:30%;
    }

    .rose5{
        top:55%;
        right:30%;
    }

    /* Mensaje */
    .message{
        position:absolute;
        width:85%;
        max-width:500px;
        text-align:center;
        color:white;
        font-size:clamp(1rem, 2vw, 1.7rem);
        line-height:1.6;
        font-weight:700;
        opacity:0;
        transform:scale(0.2);
        transition:
            opacity 1.5s ease,
            transform 1.5s ease;
        z-index:2;
        text-shadow:
            0 0 12px rgba(255,255,255,0.3),
            0 0 25px rgba(255,105,180,0.45);
        padding:20px;
    }

    .message.show{
        opacity:1;
        transform:scale(1);
    }

    /* Animación abrir rosas */
    .open .rose1{
        transform:translateY(-70px);
    }

    .open .rose2{
        transform:translate(-85px,-20px);
    }

    .open .rose3{
        transform:translate(85px,-20px);
    }

    .open .rose4{
        transform:translate(-60px,70px);
    }

    .open .rose5{
        transform:translate(60px,70px);
    }

    button{
        margin-top:40px;
        padding:14px 28px;
        border:none;
        border-radius:999px;
        background:linear-gradient(135deg,#ff4f87,#ff7aa8);
        color:white;
        font-size:1rem;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s ease;
        box-shadow:0 10px 25px rgba(255,77,121,0.35);
    }

    button:hover{
        transform:translateY(-3px) scale(1.04);
        box-shadow:0 15px 35px rgba(255,77,121,0.5);
    }

    .floating{
        position:absolute;
        font-size:20px;
        animation:float 6s linear infinite;
        opacity:0.7;
    }

    @keyframes float{
        0%{
            transform:translateY(100vh) rotate(0deg);
            opacity:0;
        }
        20%{
            opacity:0.7;
        }
        100%{
            transform:translateY(-120vh) rotate(360deg);
            opacity:0;
        }
    }

    @media (max-width:600px){

        .bouquet{
            width:90vw;
            height:90vw;
        }

        .rose{
            width:85px;
            height:85px;
        }

        .stem{
            height:140px;
        }

        button{
            width:100%;
            max-width:320px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="bouquet" id="bouquet">

        <div class="stem left"></div>
        <div class="stem center"></div>
        <div class="stem right"></div>

        <div class="message" id="message">
            🌹 NO te deprimas Su,<br>
            mira te doy estas Rositas.<br><br>
            ✨ Tú puedes ✨
        </div>

        <div class="rose rose1"></div>
        <div class="rose rose2"></div>
        <div class="rose rose3"></div>
        <div class="rose rose4"></div>
        <div class="rose rose5"></div>

    </div>

    <button id="openBtn">
        Abrir las Rositas 🌹
    </button>

</div>

<script>
    const button = document.getElementById("openBtn");
    const bouquet = document.getElementById("bouquet");
    const message = document.getElementById("message");

    let opened = false;

    button.addEventListener("click", () => {

        if(!opened){

            bouquet.classList.add("open");

            setTimeout(() => {
                message.classList.add("show");
            }, 700);

            button.innerText = "Cerrar Rositas 🌹";

            createFlowers();

            opened = true;

        }else{

            bouquet.classList.remove("open");
            message.classList.remove("show");

            button.innerText = "Abrir las Rositas 🌹";

            opened = false;
        }

    });

    function createFlowers(){

        for(let i=0; i<15; i++){

            const flower = document.createElement("div");

            flower.classList.add("floating");

            flower.innerHTML = "🌸";

            flower.style.left = Math.random() * 100 + "vw";

            flower.style.animationDuration =
                (4 + Math.random() * 4) + "s";

            flower.style.fontSize =
                (16 + Math.random() * 20) + "px";

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 7000);
        }
    }
</script>

</body>
</html>
